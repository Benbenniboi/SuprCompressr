name: Build Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get install -y python3-tk
          pip install pyinstaller zstandard py7zr tkinterdnd2

      - name: Build
        run: |
          pyinstaller \
            --onefile \
            --name SuprComopressr \
            --hidden-import zstandard \
            --hidden-import py7zr \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --hidden-import tkinterdnd2 \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuprComopressr-linux
          path: dist/SuprComopressr

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller zstandard py7zr tkinterdnd2

      - name: Build
        run: |
          pyinstaller `
            --onefile `
            --name SuprComopressr `
            --hidden-import zstandard `
            --hidden-import py7zr `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.filedialog `
            --hidden-import tkinter.messagebox `
            --hidden-import tkinterdnd2 `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuprComopressr-windows
          path: dist\SuprComopressr.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: SuprComopressr-linux

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: SuprComopressr-windows

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SuprComopressr
            SuprComopressr.exe
